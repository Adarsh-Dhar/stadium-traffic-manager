openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FIFA World Cup Stadium AI Traffic Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tickets
    description: Ticket validation and scanning
  - name: stadium
    description: Stadium capacity and status
  - name: metrics
    description: System performance metrics
  - name: admin
    description: Admin and scaling operations
  - name: simulation
    description: Load simulation controls
  - name: worldcup
    description: FIFA World Cup 2026 data
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /ticket/validate:
    post:
      operationId: validateTicket
      tags: [tickets]
      summary: Validate a ticket QR code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketInput"
      responses:
        "200":
          description: Ticket valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketValidationResult"
        "401":
          description: Invalid ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketValidationResult"
        "503":
          description: Service overloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverloadError"

  /ticket/scan:
    post:
      operationId: scanTicket
      tags: [tickets]
      summary: Process stadium entry scan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanInput"
      responses:
        "200":
          description: Entry processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /stadium/capacity:
    get:
      operationId: getStadiumCapacity
      tags: [stadium]
      summary: Get current stadium occupancy
      responses:
        "200":
          description: Stadium capacity info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StadiumCapacity"

  /metrics/current:
    get:
      operationId: getCurrentMetrics
      tags: [metrics]
      summary: Get current system performance metrics
      responses:
        "200":
          description: Current metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMetrics"

  /metrics/history:
    get:
      operationId: getMetricsHistory
      tags: [metrics]
      summary: Get recent metrics history for charting
      responses:
        "200":
          description: Metrics history array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MetricsSnapshot"

  /metrics/alerts:
    get:
      operationId: getAlerts
      tags: [metrics]
      summary: Get active system alerts and AI recommendations
      responses:
        "200":
          description: Active alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /admin/scale:
    post:
      operationId: scaleServer
      tags: [admin]
      summary: Manually scale server capacity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScaleInput"
      responses:
        "200":
          description: Scale action applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScaleResult"

  /admin/reset:
    post:
      operationId: resetSystem
      tags: [admin]
      summary: Reset all metrics and simulation state
      responses:
        "200":
          description: System reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResult"

  /admin/ai-analyze:
    post:
      operationId: aiAnalyze
      tags: [admin]
      summary: Trigger AI analysis and auto-healing
      responses:
        "200":
          description: AI analysis result with recommended actions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalysisResult"

  /simulation/start:
    post:
      operationId: startSimulation
      tags: [simulation]
      summary: Start a crowd surge simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationConfig"
      responses:
        "200":
          description: Simulation started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationStatus"

  /simulation/stop:
    post:
      operationId: stopSimulation
      tags: [simulation]
      summary: Stop the running simulation
      responses:
        "200":
          description: Simulation stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationStatus"

  /simulation/status:
    get:
      operationId: getSimulationStatus
      tags: [simulation]
      summary: Get current simulation status and load stage
      responses:
        "200":
          description: Simulation status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulationStatus"

  /metrics/mcp-status:
    get:
      operationId: getMcpStatus
      tags: [metrics]
      summary: Get Dynatrace MCP bridge connection status
      responses:
        "200":
          description: MCP bridge status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/McpBridgeStatus"

  /worldcup/matches:
    get:
      operationId: getWorldCupMatches
      tags: [worldcup]
      summary: Get World Cup matches
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [live, upcoming, finished]
      responses:
        "200":
          description: World Cup matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchList"

  /worldcup/upcoming:
    get:
      operationId: getWorldCupUpcoming
      tags: [worldcup]
      summary: Get upcoming World Cup matches
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Upcoming matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchList"

  /worldcup/live:
    get:
      operationId: getWorldCupLive
      tags: [worldcup]
      summary: Get live World Cup matches
      responses:
        "200":
          description: Live matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchList"

  /worldcup/standings:
    get:
      operationId: getWorldCupStandings
      tags: [worldcup]
      summary: Get World Cup standings
      responses:
        "200":
          description: Tournament standings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandingsResponse"

  /worldcup/tournament:
    get:
      operationId: getWorldCupTournament
      tags: [worldcup]
      summary: Get tournament information
      responses:
        "200":
          description: Tournament info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentInfo"

  /worldcup/team/{id}:
    get:
      operationId: getWorldCupTeam
      tags: [worldcup]
      summary: Get team information
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Team info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /worldcup/match/{id}/stats:
    get:
      operationId: getWorldCupMatchStats
      tags: [worldcup]
      summary: Get match statistics
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Match stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /worldcup/group/{name}:
    get:
      operationId: getWorldCupGroup
      tags: [worldcup]
      summary: Get group standings and matches
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Group data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupResponse"

  /worldcup/bracket:
    get:
      operationId: getWorldCupBracket
      tags: [worldcup]
      summary: Get knockout stage bracket
      responses:
        "200":
          description: Bracket matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    TicketInput:
      type: object
      required: [ticketId, userId]
      properties:
        ticketId:
          type: string
        userId:
          type: string

    ScanInput:
      type: object
      required: [ticketId, gate]
      properties:
        ticketId:
          type: string
        gate:
          type: string

    ScaleInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [add-server, remove-server]

    SimulationConfig:
      type: object
      properties:
        intensity:
          type: string
          enum: [low, medium, high, surge]
        durationSeconds:
          type: integer

    TicketValidationResult:
      type: object
      required: [valid, processingTime]
      properties:
        valid:
          type: boolean
        processingTime:
          type: integer
        metrics:
          $ref: "#/components/schemas/SystemMetrics"
        error:
          type: ["string", "null"]

    ScanResult:
      type: object
      required: [success, gate, entryTime]
      properties:
        success:
          type: boolean
        gate:
          type: string
        entryTime:
          type: string
        totalEntered:
          type: integer

    StadiumCapacity:
      type: object
      required: [totalCapacity, currentOccupancy, occupancyPercent, gates]
      properties:
        totalCapacity:
          type: integer
        currentOccupancy:
          type: integer
        occupancyPercent:
          type: number
        gates:
          type: array
          items:
            $ref: "#/components/schemas/GateStatus"

    GateStatus:
      type: object
      required: [id, name, status, throughput]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [open, congested, closed]
        throughput:
          type: integer

    SystemMetrics:
      type: object
      required: [avgLatency, p95Latency, p99Latency, cpuUsage, memoryUsage, activeServers, requestsPerSecond, errorRate, k6P95Pass, k6P99Pass]
      properties:
        avgLatency:
          type: number
        p95Latency:
          type: number
        p99Latency:
          type: number
        cpuUsage:
          type: number
        memoryUsage:
          type: number
        activeServers:
          type: integer
        requestsPerSecond:
          type: number
        errorRate:
          type: number
        totalRequests:
          type: integer
        k6P95Pass:
          type: boolean
          description: "Whether p95 latency is under K6 threshold (2000ms)"
        k6P99Pass:
          type: boolean
          description: "Whether p99 latency is under K6 threshold (5000ms)"

    MetricsSnapshot:
      type: object
      required: [timestamp, avgLatency, p95Latency, p99Latency, cpuUsage, memoryUsage, requestsPerSecond, activeServers]
      properties:
        timestamp:
          type: integer
        avgLatency:
          type: number
        p95Latency:
          type: number
        p99Latency:
          type: number
        cpuUsage:
          type: number
        memoryUsage:
          type: number
        requestsPerSecond:
          type: number
        activeServers:
          type: integer
        errorRate:
          type: number
        k6P95Pass:
          type: boolean
        k6P99Pass:
          type: boolean

    Alert:
      type: object
      required: [id, severity, title, message, timestamp]
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        title:
          type: string
        message:
          type: string
        timestamp:
          type: integer
        resolved:
          type: boolean
        aiAction:
          type: ["string", "null"]

    ScaleResult:
      type: object
      required: [success, activeServers]
      properties:
        success:
          type: boolean
        activeServers:
          type: integer
        metrics:
          $ref: "#/components/schemas/SystemMetrics"

    ResetResult:
      type: object
      required: [status]
      properties:
        status:
          type: string

    AiAnalysisResult:
      type: object
      required: [status, analysis, actions, confidence]
      properties:
        status:
          type: string
        analysis:
          type: string
        actions:
          type: array
          items:
            type: string
        confidence:
          type: number
        serversAdded:
          type: integer
        metricsAfter:
          $ref: "#/components/schemas/SystemMetrics"

    SimulationStatus:
      type: object
      required: [running, stage, intensity, elapsedSeconds, virtualUsers]
      properties:
        running:
          type: boolean
        stage:
          type: string
        intensity:
          type: ["string", "null"]
        elapsedSeconds:
          type: integer
        virtualUsers:
          type: integer
        nextStage:
          type: ["string", "null"]

    McpBridgeStatus:
      type: object
      required: [connected, serverUrl, toolsAvailable, lastPing, eventsForwarded]
      properties:
        connected:
          type: boolean
        serverUrl:
          type: string
        toolsAvailable:
          type: array
          items:
            type: string
        lastPing:
          type: integer
        eventsForwarded:
          type: integer
        dynatraceEnvId:
          type: ["string", "null"]
        status:
          type: string
          enum: [connected, simulated, disconnected]

    OverloadError:
      type: object
      required: [error]
      properties:
        error:
          type: string
        metrics:
          $ref: "#/components/schemas/SystemMetrics"

    Match:
      type: object
      properties:
        id:
          type: integer
        homeTeam:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            crest:
              type: string
        awayTeam:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            crest:
              type: string
        utcDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [SCHEDULED, LIVE, FINISHED]
        stage:
          type: string
        group:
          type: string
        score:
          type: object
          properties:
            fullTime:
              type: object
              properties:
                home:
                  type: integer
                  nullable: true
                away:
                  type: integer
                  nullable: true
            halfTime:
              type: object
              properties:
                home:
                  type: integer
                  nullable: true
                away:
                  type: integer
                  nullable: true
            winner:
              type: string
              nullable: true
        venue:
          type: string

    MatchList:
      type: object
      properties:
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"

    GroupTeam:
      type: object
      properties:
        position:
          type: integer
        team:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            crest:
              type: string
        points:
          type: integer
        goalsFor:
          type: integer
        goalsAgainst:
          type: integer
        goalDifference:
          type: integer
        played:
          type: integer
        won:
          type: integer
        drawn:
          type: integer
        lost:
          type: integer

    Group:
      type: object
      properties:
        name:
          type: string
        table:
          type: array
          items:
            $ref: "#/components/schemas/GroupTeam"

    StandingsResponse:
      type: object
      properties:
        standings:
          type: array
          items:
            $ref: "#/components/schemas/Group"

    TournamentInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        emblem:
          type: string
        area:
          type: object
          properties:
            name:
              type: string
        currentSeason:
          type: object
          properties:
            startDate:
              type: string
            endDate:
              type: string
            currentMatchday:
              type: integer

    Team:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        crest:
          type: string

    GroupResponse:
      type: object
      properties:
        group:
          $ref: "#/components/schemas/Group"
        matches:
          type: array
          items:
            $ref: "#/components/schemas/Match"
