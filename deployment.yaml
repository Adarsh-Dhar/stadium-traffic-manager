apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      # Container 1: The Mock Server Sidecar
      - name: mock-server
        image: node:20-slim
        imagePullPolicy: IfNotPresent
        command: ["node", "/app/mock-server.js"]
        volumeMounts:
        - name: mock-server-script
          mountPath: /app/mock-server.js
          subPath: mock-server.js
        ports:
        - containerPort: 5000
          name: http

      volumes:
      - name: mock-server-script
        configMap:
          name: mock-server-script