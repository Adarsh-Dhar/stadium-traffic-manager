apiVersion: apps/v1
kind: Deployment
metadata:
  name: watchdog-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: watchdog
  template:
    metadata:
      labels:
        app: watchdog
    spec:
      containers:
      # Container 1: Your Watchdog
      - name: watchdog-container
        image: watchdog:local
        imagePullPolicy: IfNotPresent
        env:
        - name: METRICS_API_URL
          value: "http://localhost:5000/metrics/rps"
        - name: RPS_PER_REPLICA
          value: "1000"
        - name: MIN_REPLICAS
          value: "2"
        - name: MAX_REPLICAS
          value: "15"
        - name: RPS_YELLOW_THRESHOLD
          value: "8500"
        - name: RPS_RED_THRESHOLD
          value: "9500"
        - name: COOLDOWN_SECONDS
          value: "300"
        - name: POLL_INTERVAL_MS
          value: "5000"
      
      # Container 2: The Mock Server Sidecar
      - name: mock-server
        image: node:20-slim
        imagePullPolicy: IfNotPresent
        command: ["node", "/app/mock-server.js"]
        volumeMounts:
        - name: mock-server-script
          mountPath: /app/mock-server.js
          subPath: mock-server.js
        ports:
        - containerPort: 5000
          name: http

      volumes:
      - name: mock-server-script
        configMap:
          name: mock-server-script