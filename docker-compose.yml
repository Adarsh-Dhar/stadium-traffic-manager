services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    # Seed the test counter so the agent gets real data on first run
    command: >
      sh -c "redis-server --daemonize yes &&
             sleep 1 &&
             redis-cli SET tickets_scanned 0 &&
             redis-cli shutdown &&
             redis-server"
    # Handle Docker layer cache issues
    pull_policy: missing

  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stadium
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Handle Docker layer cache issues - if pull fails, try: docker builder prune -a
    pull_policy: missing

  # ── Application ─────────────────────────────────────────────────────────────

  api-server:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      PORT: "5000"
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stadium
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-agent:
    build:
      context: ./ai-agent
      dockerfile: Dockerfile
    env_file: .env
    environment:
      AI_AGENT_API_BASE: http://api-server:5000/api/fifa
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stadium
    depends_on:
      api-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data: