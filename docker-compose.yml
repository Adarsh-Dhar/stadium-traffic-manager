# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "app".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  app:
    build:
      context: .
      target: final
    # If your application exposes a port, uncomment the following lines and change
    # the port numbers as needed. The first number is the host port and the second
    # is the port inside the container.
    # ports:
    #   - 8080:8080

  # Redis for ticketing velocity tracking
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL for historical game data
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=stadium
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # RPS Prediction Agent
  rps-agent:
    build:
      context: ./artifacts/rps-agent
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - AI_AGENT_API_BASE=${AI_AGENT_API_BASE:-http://app:5000/api/fifa}
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/stadium
      - GAME_TYPE=${GAME_TYPE:-regular_game}
      - STADIUM_LAT=${STADIUM_LAT:-40.8128}
      - STADIUM_LON=${STADIUM_LON:--74.0742}
      - TRANSITLAND_KEY=${TRANSITLAND_KEY}
      - TRANSIT_STOP_ID=${TRANSIT_STOP_ID:-s-dr5rjy-pennstation}
      - TOMTOM_API_KEY=${TOMTOM_API_KEY}
      - ROAD_LAT=${ROAD_LAT:-40.8128}
      - ROAD_LON=${ROAD_LON:--74.0742}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://localhost:9090}
      - AGENT_CHECK_INTERVAL=${AGENT_CHECK_INTERVAL:-15000}
      - AI_AGENT_DRY_RUN=${AI_AGENT_DRY_RUN:-false}
    restart: unless-stopped

volumes:
  postgres-data:
