apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: watchdog-role
rules:
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: watchdog-rolebinding
subjects:
- kind: ServiceAccount
  name: default
roleRef:
  kind: Role
  name: watchdog-role
  apiGroup: rbac.authorization.k8s.io