kind = "web"
previewPath = "/"
title = "FIFA AI Traffic Dashboard"
version = "1.0.0"
id = "artifacts/fifa-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21524

[services.development]
run = "pnpm --filter @workspace/fifa-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fifa-dashboard", "run", "build" ]
publicDir = "artifacts/fifa-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21524"
BASE_PATH = "/"
